<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 프로필 — 월간 CMDS 18회차</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!--
    👋 이 파일이 '실습 대상'입니다.
    아래 [ ] 안을 본인 것으로 바꾸거나, Claude에게 "내 이름을 OOO으로 바꿔줘"라고 말해보세요.
    그리고 /save (저장) → /experiment (실험) → /ship (검토·반영) → /site (배포)를 체험합니다.
  -->
  <main class="card">
    <div class="avatar">🙂</div>
    <h1 class="name">[당신의 이름]</h1>
    <p class="tagline">[한 줄 소개 — 예: AI로 일하는 기획자]</p>

    <p class="bio">
      [자기소개 두세 문장. 무엇을 하고, 무엇에 관심 있는지 자유롭게.]
    </p>

    <ul class="links">
      <li><a href="#">이메일</a></li>
      <li><a href="#">GitHub</a></li>
      <li><a href="#">블로그/링크드인</a></li>
    </ul>

    <footer class="made">월간 CMDS 18회차에서 git/GitHub로 만든 페이지</footer>
  </main>
</body>
</html>
